<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Atención VIP - Mesa 6</title>

<link rel="icon" href="assets/logo-lap.png">
<link rel="apple-touch-icon" href="assets/logo-lap.png">
<link rel="manifest" href="manifest.json">

<!-- FUENTE CORPORATIVA PREMIUM -->
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet">

<style>

body{
  font-family: 'Montserrat', sans-serif;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
  flex-direction: column;

  position: relative;
  overflow: hidden;
}

/* Fondo Salón VIP */
body::before{
  content:"";
  position:absolute;
  inset:0;

  background:
    linear-gradient(
      rgba(0,0,0,0.55),
      rgba(0,0,0,0.55)
    ),
    url('assets/salon-vip.jpeg');

  background-size: cover;
  background-position: 40% center;
  background-repeat: no-repeat;

  filter: blur(8px) brightness(0.55);

  transform: scale(1.10);

  z-index:-1;
}

/* BOTÓN VIP */
button{
  position: relative;

  width: 340px;
  height: 340px;

  border-radius: 50%;
  border: 4px solid rgba(255,255,255,0.15);

  background:
    radial-gradient(
      circle at 30% 30%,
      #fff3c7 0%,
      #e5c46a 20%,
      #c79a2e 55%,
      #8f6b10 100%
    );

  color: #1a1a1a;

  cursor: pointer;

  box-shadow:
    inset 0 8px 15px rgba(255,255,255,0.35),
    inset 0 -12px 20px rgba(0,0,0,0.25),
    0 15px 40px rgba(0,0,0,0.6),
    0 0 25px rgba(212,175,55,0.25);

  transition: all 0.2s ease;

  animation: pulse 2.5s infinite;
}

/* aro exterior */
button::before{
  content:'';
  position:absolute;
  top:-12px;
  left:-12px;
  width:360px;
  height:360px;
  border-radius:50%;
  border:1px solid rgba(212,175,55,0.35);
}

/* efecto click */
button:active{
  transform: translateY(4px) scale(0.97);

  box-shadow:
    inset 0 4px 10px rgba(255,255,255,0.2),
    inset 0 -6px 12px rgba(0,0,0,0.3),
    0 8px 20px rgba(0,0,0,0.5);
}

/* Pulso */
@keyframes pulse{

  0%{
    box-shadow:
      inset 0 8px 15px rgba(255,255,255,0.35),
      inset 0 -12px 20px rgba(0,0,0,0.25),
      0 15px 40px rgba(0,0,0,0.6),
      0 0 0 0 rgba(212,175,55,0.35);
  }

  70%{
    box-shadow:
      inset 0 8px 15px rgba(255,255,255,0.35),
      inset 0 -12px 20px rgba(0,0,0,0.25),
      0 15px 40px rgba(0,0,0,0.6),
      0 0 0 30px rgba(212,175,55,0);
  }

  100%{
    box-shadow:
      inset 0 8px 15px rgba(255,255,255,0.35),
      inset 0 -12px 20px rgba(0,0,0,0.25),
      0 15px 40px rgba(0,0,0,0.6),
      0 0 0 0 rgba(212,175,55,0);
  }
}

/* Campana */
.campana{
  display:block;
  font-size:75px;
  line-height:1;
  margin-bottom:15px;

  text-shadow:
    0 0 8px rgba(255,255,255,0.5),
    0 0 18px rgba(212,175,55,0.45);
}

/* Texto principal */
.texto-boton{
  font-family: 'Montserrat', sans-serif;
  font-size: 28px;
  font-weight: 800;
  letter-spacing: 3px;
  line-height: 1.3;
}

/* Mensajes */
#mensaje{
  margin-top: 30px;
  font-size: 18px;
  color: #00ff88;
  text-align: center;
  font-weight: 600;
  min-height: 20px;
}

/* Logo Alturas */
.logo-vip{
  position: fixed;
  bottom: 25px;
  right: 20px;

  width: 450px;
  height: auto;

  opacity: 0.60;

  z-index: 5;

  pointer-events: none;
}

</style>

</head>

<body>

<button onclick="enviarSolicitud()">

<span class="campana">🛎️</span>

<span class="texto-boton">
SOLICITAR
<br>
ASISTENCIA
</span>

</button>

<div id="mensaje"></div>

<img
  src="assets/logo-alturas-transparente.png"
  class="logo-vip"
  alt="Alturas VIP Lounge">

<script>

const mesa = 6;

function enviarSolicitud(){

  document.getElementById("mensaje").innerHTML =
  "Enviando solicitud...";

  fetch("https://script.google.com/macros/s/AKfycbxU5N9gvYgnr6ziPolPuPircfFdsRzLgCfVqntC8WGwZ-wath6i5o1dUuAfPFcBVJh2/exec?mesa="+mesa)

  .then(r => r.text())

  .then(() => {

    document.getElementById("mensaje").innerHTML =
    "✔ Personal notificado";

    setTimeout(() => {
      document.getElementById("mensaje").innerHTML = "";
    }, 3500);

  })

  .catch(() => {

    document.getElementById("mensaje").innerHTML =
    "❌ No se pudo enviar la solicitud";

    setTimeout(() => {
      document.getElementById("mensaje").innerHTML = "";
    }, 3500);

  });

}

</script>

</body>
</html>
