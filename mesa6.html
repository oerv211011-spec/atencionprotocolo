<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Atención VIP - Mesa 6</title>

<link rel="icon" href="assets/logo-lap.png">
<link rel="apple-touch-icon" href="assets/logo-lap.png">
<link rel="manifest" href="manifest.json">

<style>
body{
  font-family: Arial;
  background: linear-gradient(135deg, #0a0a0a, #1a1a1a);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
  flex-direction: column;
}

/* BOTÓN VIP */
button{
  width: 320px;
  height: 320px;
  border-radius: 50%;
  border: 3px solid #d4af37;
  background: radial-gradient(circle at top, #f5d98b, #b8860b);
  color: #111;
  font-weight: bold;
  font-size: 26px;
  cursor: pointer;
  box-shadow: 0 10px 30px rgba(0,0,0,0.6);
  transition: all 0.2s ease;
}

/* efecto al presionar */
button:active{
  transform: scale(0.95);
  box-shadow: 0 5px 15px rgba(0,0,0,0.4);
}

#mensaje{
  margin-top: 25px;
  font-size: 20px;
  color: #00ff88;
  text-align: center;
}
</style>

</head>

<body>

<button onclick="enviarSolicitud()">
🔔<br><span style="font-size:28px">SOLICITAR</span><br><span style="font-size:24px">ATENCIÓN</span>
</button>

<div id="mensaje"></div>

<script>

const mesa = 6;

function enviarSolicitud(){

fetch("https://script.google.com/macros/s/AKfycbxU5N9gvYgnr6ziPolPuPircfFdsRzLgCfVqntC8WGwZ-wath6i5o1dUuAfPFcBVJh2/exec?mesa="+mesa)
.then(response => response.text())
.then(data => {

document.getElementById("mensaje").innerHTML =
"✓ Solicitud enviada (Mesa 6)";

});

}

</script>

</body>
</html>
