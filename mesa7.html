<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#17120b">
<title>Atención VIP - Mesa 7</title>

<link rel="icon" href="assets/logo-lap.png">
<link rel="apple-touch-icon" href="assets/logo-lap.png">
<link rel="manifest" href="manifest7.json">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --dorado-claro:#f7f1e3;
  --dorado:#d8b878;
  --dorado-medio:#b88a4a;
  --dorado-oscuro:#8a6436;
  --fondo-panel:rgba(15,12,8,.78);
  --borde:rgba(241,213,138,.34);
  --texto-suave:rgba(255,255,255,.75);
}

*{ box-sizing:border-box; }

html, body{ width:100%; min-height:100%; }

body{
  font-family:'Montserrat',sans-serif;
  color:black;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  min-height:100dvh;
  margin:0;
  position:relative;
  overflow:hidden;
  background:#14100b;
}

body::before{
  content:"";
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at 50% 40%, rgba(255,244,214,.10), transparent 55%),
    radial-gradient(circle at 20% 80%, rgba(241,213,138,.08), transparent 60%),
    linear-gradient(rgba(0,0,0,.68), rgba(0,0,0,.68)),
    url('assets/salon-vip.jpeg');
  background-size:cover;
  background-position:40% center;
  background-repeat:no-repeat;
  filter:blur(8px) brightness(.55);
  transform:scale(1.10);
  z-index:-1;
}

button, input{ font-family:'Montserrat',sans-serif; }
button{ -webkit-tap-highlight-color:transparent; }
button:focus-visible, input:focus-visible{
  outline:3px solid rgba(247,241,227,.7);
  outline-offset:4px;
}

.pantalla{
  display:none;
  width:100%;
  max-width:760px;
  max-height:100dvh;
  padding:28px 22px 120px;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  overflow-y:auto;
  opacity:0;
  transform:translateY(6px);
  transition:opacity .28s ease, transform .28s ease;
}

.pantalla.activa{
  display:flex;
  opacity:1;
  transform:translateY(0);
}

.texto-bienvenida{
  font-size:clamp(30px,5vw,40px);
  font-weight:800;
  letter-spacing:2px;
  margin-bottom:18px;
  color:#fff;
  text-shadow:0 0 25px rgba(255,255,255,.15);
}

.titulo-seccion{
  font-size:clamp(24px,4vw,34px);
  font-weight:800;
  letter-spacing:2px;
  color:#f1d58a;
  margin:0 0 12px;
  text-shadow:0 0 20px rgba(241,213,138,.3);
}

.subtitulo-seccion{
  max-width:560px;
  margin:0 0 22px;
  color:var(--texto-suave);
  font-size:15px;
  line-height:1.6;
}

.texto-seleccion{
  font-size:17px;
  margin-bottom:26px;
  line-height:1.8;
  color:var(--texto-suave);
}

/* Botones rectangulares del menú */
.idioma-btn{
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  width:min(320px,88vw);
  min-height:78px;
  margin:11px;
  padding:15px 22px;
  border:1px solid rgba(255,255,255,.15);
  border-radius:18px;
  background:radial-gradient(circle at 30% 30%, #fff4d6 0%, #d6b56d 20%, #9d7a35 55%, #5b451d 100%);
  color:#1a1a1a;
  font-size:clamp(18px,3vw,25px);
  font-weight:800;
  letter-spacing:1.5px;
  line-height:1.2;
  cursor:pointer;
  box-shadow:
    inset 0 8px 15px rgba(255,255,255,.35),
    inset 0 -12px 20px rgba(0,0,0,.25),
    0 10px 25px rgba(0,0,0,.5),
    0 0 15px rgba(241,213,138,.20);
  transition:transform .2s ease, filter .2s ease;
  user-select:none;
}

.idioma-btn:hover{ transform:translateY(-3px); }
.idioma-btn:active{ transform:translateY(2px) scale(.97); filter:brightness(.93); }
.idioma-btn:disabled{ opacity:.58; cursor:wait; transform:none; }

/* Botón circular de asistencia */
.boton-asistencia{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  position:relative;
  width:min(340px,78vw);
  height:min(340px,78vw);
  max-width:340px;
  max-height:340px;
  min-width:270px;
  min-height:270px;
  border-radius:50%;
  border:1.5px solid rgba(255,244,214,.35);
  background:radial-gradient(circle at 30% 25%, #f7f1e3 0%, #d8b878 20%, #b88a4a 45%, #8a6436 75%, #3b2a16 100%);
  color:#1a1a1a;
  cursor:pointer;
  box-shadow:
    inset 0 8px 14px rgba(255,255,255,.14),
    inset 0 -12px 18px rgba(0,0,0,.28),
    0 16px 35px rgba(0,0,0,.55),
    0 0 10px rgba(180,140,70,.08);
  animation:pulse 2.5s infinite;
  transition:transform .18s cubic-bezier(.2,.9,.2,1), box-shadow .18s ease, filter .18s ease;
  user-select:none;
}

.boton-asistencia::before{
  content:"";
  position:absolute;
  inset:-12px;
  border-radius:50%;
  border:1.5px solid rgba(184,140,70,.28);
  pointer-events:none;
}

.boton-asistencia:hover{ transform:translateY(-2px); }
.boton-asistencia:active{
  transform:translateY(8px) scale(.955);
  box-shadow:
    inset 0 6px 14px rgba(255,255,255,.18),
    inset 0 -18px 25px rgba(0,0,0,.45),
    0 8px 20px rgba(0,0,0,.55);
  filter:brightness(.92) contrast(1.05);
}

@keyframes pulse{
  0%,100%{
    box-shadow:
      inset 0 8px 15px rgba(255,255,255,.35),
      inset 0 -12px 20px rgba(0,0,0,.25),
      0 15px 40px rgba(0,0,0,.6),
      0 0 0 0 rgba(255,244,214,.35);
  }
  70%{
    box-shadow:
      inset 0 8px 15px rgba(255,255,255,.35),
      inset 0 -12px 20px rgba(0,0,0,.25),
      0 15px 40px rgba(0,0,0,.6),
      0 0 0 30px rgba(255,244,214,0);
  }
}

.campana{
  display:inline-block;
  font-size:52px;
  margin-bottom:15px;
  opacity:.95;
  line-height:1;
  text-shadow:0 2px 10px rgba(0,0,0,.25);
  transform-origin:top center;
}

.campana-sonando{ animation:sonarCampana .8s ease; }

@keyframes sonarCampana{
  0%,100%{ transform:rotate(0deg); }
  10%{ transform:rotate(-20deg); }
  20%{ transform:rotate(20deg); }
  30%{ transform:rotate(-18deg); }
  40%{ transform:rotate(18deg); }
  50%{ transform:rotate(-14deg); }
  60%{ transform:rotate(14deg); }
  70%{ transform:rotate(-8deg); }
  80%{ transform:rotate(8deg); }
}

.texto-boton{
  font-weight:800;
  font-size:24px;
  letter-spacing:3px;
  line-height:1.15;
  text-transform:uppercase;
  opacity:.95;
}

#mensaje{
  margin-top:30px;
  min-height:58px;
  font-size:20px;
  color:#fff;
  text-align:center;
  font-weight:600;
  line-height:1.6;
}

.dots::after{
  content:"";
  display:inline-block;
  width:28px;
  text-align:left;
  animation:dots 1.2s infinite;
}

@keyframes dots{
  0%,100%{ content:""; }
  25%{ content:"."; }
  50%{ content:".."; }
  75%{ content:"..."; }
}

.enlace-secundario{
  margin-top:34px;
  padding:12px 18px;
  color:rgba(255,255,255,.82);
  font-size:16px;
  cursor:pointer;
  transition:color .2s ease, transform .2s ease;
  user-select:none;
}

.enlace-secundario:hover{ color:#f1d58a; transform:translateY(-1px); }

/* Consulta de vuelo */
.consulta-panel{
  width:min(620px,94vw);
  padding:25px;
  border:1px solid var(--borde);
  border-radius:26px;
  background:linear-gradient(145deg, rgba(32,25,15,.90), rgba(10,8,5,.84));
  box-shadow:0 22px 60px rgba(0,0,0,.48), inset 0 1px 0 rgba(255,255,255,.08);
  backdrop-filter:blur(10px);
}

.input-vuelo{
  width:min(410px,100%);
  height:62px;
  padding:0 18px;
  border:1px solid rgba(241,213,138,.45);
  border-radius:16px;
  background:rgba(255,255,255,.95);
  color:#17120b;
  font-size:24px;
  font-weight:800;
  letter-spacing:2px;
  text-align:center;
  text-transform:uppercase;
  box-shadow:inset 0 2px 7px rgba(0,0,0,.15);
}

.input-vuelo::placeholder{
  color:rgba(30,24,16,.48);
  font-size:18px;
  letter-spacing:.5px;
  text-transform:none;
}

.buscar-btn{
  width:min(410px,100%);
  min-height:64px;
  margin:16px auto 0;
  font-size:19px;
}

.selector-fecha{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:8px;
  width:min(500px,100%);
  margin:4px auto 20px;
  padding:6px;
  border:1px solid rgba(241,213,138,.30);
  border-radius:16px;
  background:rgba(0,0,0,.28);
}

.fecha-btn{
  min-height:48px;
  padding:8px 6px;
  border:1px solid transparent;
  border-radius:11px;
  background:transparent;
  color:rgba(255,255,255,.74);
  font-size:13px;
  font-weight:800;
  line-height:1.15;
  cursor:pointer;
  transition:background .2s ease, color .2s ease, border-color .2s ease, transform .15s ease;
}

.fecha-btn:hover{
  color:#fff4d6;
  transform:translateY(-1px);
}

.fecha-btn.activo{
  color:#17120b;
  border-color:rgba(255,255,255,.25);
  background:linear-gradient(145deg,#f7f1e3,#c99c4f);
  box-shadow:0 6px 16px rgba(0,0,0,.28);
}

.fecha-destacada{
  margin-top:5px;
  color:#f1d58a;
  font-size:14px;
  font-weight:800;
  letter-spacing:.5px;
  text-transform:uppercase;
}

#resultadoVuelo{
  width:100%;
  margin-top:20px;
  min-height:42px;
}

.cargando-vuelo{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:10px;
  padding:20px 10px 8px;
  color:#fff;
  font-size:17px;
}

.avion-cargando{
  font-size:38px;
  animation:flotar 1.2s ease-in-out infinite;
}

@keyframes flotar{
  0%,100%{ transform:translateY(0); }
  50%{ transform:translateY(-7px); }
}

.mensaje-resultado{
  padding:20px;
  border-radius:18px;
  border:1px solid rgba(255,255,255,.14);
  background:rgba(0,0,0,.28);
  line-height:1.55;
}

.mensaje-resultado strong{
  display:block;
  color:#f1d58a;
  font-size:19px;
  margin-bottom:5px;
}

.tarjeta-vuelo{
  overflow:hidden;
  text-align:left;
  border:1px solid rgba(241,213,138,.38);
  border-radius:22px;
  background:linear-gradient(150deg, rgba(255,255,255,.10), rgba(0,0,0,.32));
  box-shadow:0 18px 40px rgba(0,0,0,.34);
}

.cabecera-vuelo{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:16px;
  padding:22px;
  border-bottom:1px solid rgba(241,213,138,.20);
  background:linear-gradient(110deg, rgba(216,184,120,.20), rgba(0,0,0,.10));
}

.identidad-vuelo{ min-width:0; }
.aerolinea{
  color:rgba(255,255,255,.72);
  font-size:13px;
  letter-spacing:1px;
  text-transform:uppercase;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}

.codigo-vuelo{
  margin-top:3px;
  color:#fff4d6;
  font-size:clamp(30px,7vw,42px);
  font-weight:800;
  letter-spacing:2px;
}

.estado-pill{
  flex:0 0 auto;
  max-width:48%;
  padding:9px 12px;
  border-radius:999px;
  font-size:12px;
  font-weight:800;
  line-height:1.2;
  text-align:center;
  text-transform:uppercase;
  letter-spacing:.5px;
  border:1px solid rgba(255,255,255,.22);
}

.estado-verde{ background:rgba(41,154,89,.28); color:#c8ffdc; }
.estado-amarillo{ background:rgba(224,179,45,.26); color:#fff0ac; }
.estado-naranja{ background:rgba(224,117,38,.28); color:#ffd4b6; }
.estado-rojo{ background:rgba(205,58,58,.30); color:#ffd0d0; }
.estado-neutro{ background:rgba(170,170,170,.20); color:#f2f2f2; }

.datos-vuelo{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:1px;
  background:rgba(241,213,138,.16);
}

.dato-vuelo{
  min-height:94px;
  padding:17px 18px;
  background:rgba(12,10,7,.88);
}

.dato-etiqueta{
  color:rgba(255,255,255,.60);
  font-size:12px;
  letter-spacing:.8px;
  text-transform:uppercase;
  margin-bottom:7px;
}

.dato-valor{
  color:#fff;
  font-size:19px;
  font-weight:800;
  line-height:1.25;
  overflow-wrap:anywhere;
}

.pie-vuelo{
  padding:14px 18px 17px;
  color:rgba(255,255,255,.60);
  font-size:11px;
  line-height:1.45;
  text-align:center;
  border-top:1px solid rgba(241,213,138,.16);
  background:rgba(0,0,0,.22);
}

.logo-vip{
  position:fixed;
  bottom:20px;
  right:14px;
  width:min(450px,48vw);
  opacity:.65;
  pointer-events:none;
  z-index:-0;
}

@media (max-width:520px){
  .pantalla{ padding:22px 14px 90px; justify-content:flex-start; padding-top:8vh; }
  .consulta-panel{ padding:19px 15px; }
  .cabecera-vuelo{ align-items:flex-start; flex-direction:column; }
  .estado-pill{ max-width:100%; }
  .datos-vuelo{ grid-template-columns:1fr; }
  .boton-asistencia{ min-width:250px; min-height:250px; }
}

@media (max-height:700px){
  .pantalla{ justify-content:flex-start; padding-top:28px; }
  .boton-asistencia{ width:270px; height:270px; min-width:270px; min-height:270px; }
  .campana{ font-size:44px; }
  .texto-boton{ font-size:20px; }
}
</style>
</head>

</section>

<!-- PANTALLA MENÚ -->
<section id="pantallaMenu" class="pantalla" aria-label="Menú principal">
  <div class="titulo-seccion" id="tituloMenu">Seleccione una opción</div>
  <button type="button" class="idioma-btn" onclick="mostrarAsistencia()" id="btnAsistencia">🛎️ SOLICITAR ASISTENCIA</button>

</section>

<!-- PANTALLA ASISTENCIA -->

</section>

    <div class="selector-fecha" role="group" aria-label="Fecha del vuelo">
      <button type="button" class="fecha-btn activo" id="btnFechaNext" onclick="seleccionarModoFecha('next')">PRÓXIMO VUELO</button>
      <button type="button" class="fecha-btn" id="btnFechaToday" onclick="seleccionarModoFecha('today')">HOY</button>
      <button type="button" class="fecha-btn" id="btnFechaTomorrow" onclick="seleccionarModoFecha('tomorrow')">MAÑANA</button>
    </div>

    <input
      id="numeroVuelo"
      class="input-vuelo"
      type="text"
      inputmode="text"
      autocomplete="off"
      autocapitalize="characters"
      spellcheck="false"
      maxlength="10"
      placeholder="Ejemplo: LA2075"
      aria-label="Número de vuelo">

    <button type="button" class="idioma-btn buscar-btn" id="btnBuscarVuelo" onclick="buscarVuelo()">🔎 BUSCAR VUELO</button>

    <div id="resultadoVuelo" aria-live="polite"></div>
  </div>

  <div id="volverVuelo" class="enlace-secundario" onclick="volverMenu()" role="button" tabindex="0">⬅️ Volver</div>
  <div id="volverIdiomaVuelo" class="enlace-secundario" onclick="volverIdioma()" role="button" tabindex="0">🌐 Cambiar idioma</div>
</section>

<img src="assets/logo-alturas-transparente.png" class="logo-vip" alt="">

const pantallas = ["pantallaIdioma", "pantallaMenu", "pantallaAsistencia", "pantallaVuelo"];

function t(clave){
  return textos[idiomaActual][clave] || clave;
}

function mostrarPantalla(id){
  pantallas.forEach((pantallaId) => {
    const elemento = document.getElementById(pantallaId);
    elemento.classList.toggle("activa", pantallaId === id);
  });

  activa.scrollTop = 0;
}

function seleccionarModoFecha(modo, limpiarResultado = true){
  modoFecha = ["next", "today", "tomorrow"].includes(modo) ? modo : "next";
  actualizarSelectorFecha();

  if(limpiarResultado){
    cancelarBusqueda();
    document.getElementById("resultadoVuelo").innerHTML = "";
  }
}

function actualizarSelectorFecha(){
  const configuracion = {
    next: {
      id: "btnFechaNext",
      texto: t("nextFlight")
    },
    today: {
      id: "btnFechaToday",
      texto: t("today")
    },
    tomorrow: {
      id: "btnFechaTomorrow",
      texto: t("tomorrow")
    }
  };

  Object.entries(configuracion).forEach(([modo, datos]) => {
    const boton = document.getElementById(datos.id);
    if(!boton) return;
    boton.textContent = datos.texto;
    boton.classList.toggle("activo", modoFecha === modo);
    boton.setAttribute("aria-pressed", modoFecha === modo ? "true" : "false");
  });

  const grupo = document.querySelector(".selector-fecha");
  if(grupo){
    grupo.setAttribute(
      "aria-label",
      idiomaActual === "en" ? "Flight date" : "Fecha del vuelo"
    );
  }
}

function mensajeNoEncontrado(){
  if(modoFecha === "today"){
    return idiomaActual === "en"
      ? "No matching flight was found for today."
      : "No se encontró ese vuelo para hoy.";
  }

  if(modoFecha === "tomorrow"){
    return idiomaActual === "en"
      ? "No matching flight was found for tomorrow."
      : "No se encontró ese vuelo para mañana.";
  }

  return idiomaActual === "en"
    ? "No upcoming matching flight was found. You can also select Today or Tomorrow."
    : "No se encontró un próximo vuelo vigente. También puede seleccionar Hoy o Mañana.";
}

function normalizarNumeroVuelo(valor){
  return String(valor || "")
    .toUpperCase()
    .replace(/[^A-Z0-9]/g, "")
    .slice(0, 9);
}

function vueloValido(numero){
  return numero.length >= 3 && numero.length <= 9 && /[A-Z]/.test(numero) && /\d/.test(numero);
}

function limpiarConsultaVuelo(){
  document.getElementById("numeroVuelo").value = "";
  document.getElementById("resultadoVuelo").innerHTML = "";
  document.getElementById("btnBuscarVuelo").disabled = false;
  modoFecha = "next";
  actualizarSelectorFecha();
  buscandoVuelo = false;
}

function cancelarBusqueda(){
  if(controladorBusqueda){
    controladorBusqueda.abort();
    controladorBusqueda = null;
  }
  buscandoVuelo = false;
  const boton = document.getElementById("btnBuscarVuelo");
  if(boton) boton.disabled = false;
}

async function buscarVuelo(){
  if(buscandoVuelo) return;

  const input = document.getElementById("numeroVuelo");
  const numero = normalizarNumeroVuelo(input.value);
  input.value = numero;

  if(!vueloValido(numero)){
    mostrarMensajeVuelo(t("invalidTitle"), t("invalidText"));
    input.focus();
    return;
  }

  buscandoVuelo = true;
  const boton = document.getElementById("btnBuscarVuelo");
  boton.disabled = true;
  mostrarCargandoVuelo();

  cancelarBusqueda();
  buscandoVuelo = true;
  boton.disabled = true;
  controladorBusqueda = new AbortController();
  const temporizador = window.setTimeout(() => controladorBusqueda.abort(), 30000);

  try{
    const url = `${API_VUELOS}?search=${encodeURIComponent(numero)}&day=${encodeURIComponent(modoFecha)}&_=${Date.now()}`;
    const respuesta = await fetch(url, {
      method:"GET",
      cache:"no-store",
      signal:controladorBusqueda.signal,
      redirect:"follow"
    });

    if(!respuesta.ok){
      throw new Error(`Servicio de vuelos respondió ${respuesta.status}`);
    }

    const datos = await respuesta.json();

    if(!datos || datos.ok !== true){
      const detalle = datos && datos.error ? datos.error : "Respuesta inválida del servicio de vuelos";
      throw new Error(detalle);
    }

    if(datos.found !== true || !datos.flight){
      mostrarMensajeVuelo(t("notFoundTitle"), mensajeNoEncontrado());
      return;
    }

    const meta = datos.meta || {};
    const vuelo = {
      ...datos.flight,
      _tipo: meta.tipo || (meta.adi === "arrivals" ? "arrival" : "departure"),
      _trafico: meta.scope || (datos.flight.tip_trafico === "I" ? "international" : "domestic"),
      _diaConsulta: meta.day || "today",
      _requestedDay: meta.requestedDay || modoFecha,
      _selectedDate: meta.selectedDate || datos.flight.fch_prog || "",
      _dayRelation: meta.dayRelation || ""
    };

    mostrarTarjetaVuelo(vuelo);
  }catch(error){
    if(error.name !== "AbortError"){
      console.error("Error al consultar vuelo:", error);
    }
    mostrarMensajeVuelo(t("apiErrorTitle"), t("apiErrorText"));
  }finally{
    window.clearTimeout(temporizador);
    controladorBusqueda = null;
    buscandoVuelo = false;
    boton.disabled = false;
  }
}

const CAMPOS_CODIGO_VUELO = [
  "cod_vuelo", "cod_vuelo_op", "codigo_vuelo", "num_vuelo", "nro_vuelo",
  "flight", "flight_number", "flightnumber", "flight_code", "flightcode",
  "numeroVuelo", "codigoVuelo", "vuelo", "operating_flight", "marketing_flight"
];

function normalizarNombreCampo(valor){
  return String(valor || "")
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/[^a-zA-Z0-9]/g, "")
    .toLowerCase();
}

function obtenerValorFlexible(objeto, nombres){
  if(!objeto || typeof objeto !== "object") return "";
  const buscados = new Set(nombres.map(normalizarNombreCampo));

  for(const [clave, valor] of Object.entries(objeto)){
    if(buscados.has(normalizarNombreCampo(clave)) && valor !== null && valor !== undefined){
      return valor;
    }
  }
  return "";
}

function recopilarTextos(objeto, profundidad = 0, salida = []){
  if(profundidad > 2 || objeto === null || objeto === undefined) return salida;

  if(typeof objeto === "string" || typeof objeto === "number"){
    salida.push(String(objeto));
    return salida;
  }

  if(Array.isArray(objeto)){
    objeto.slice(0, 30).forEach((item) => recopilarTextos(item, profundidad + 1, salida));
    return salida;
  }

  if(typeof objeto === "object"){
    Object.entries(objeto).forEach(([clave, valor]) => {
      if(!clave.startsWith("_")) recopilarTextos(valor, profundidad + 1, salida);
    });
  }

  return salida;
}

function codigosPosiblesVuelo(vuelo){
  const codigos = [];
  const directo = obtenerValorFlexible(vuelo, CAMPOS_CODIGO_VUELO);
  if(directo !== "") codigos.push(normalizarNumeroVuelo(directo));

  /* Respaldo para códigos compartidos o campos con nombres no documentados. */
  recopilarTextos(vuelo).forEach((texto) => {
    const compactado = normalizarNumeroVuelo(texto);
    const coincidencias = compactado.match(/[A-Z]{2,3}\d{1,4}/g) || [];
    codigos.push(...coincidencias.map(normalizarNumeroVuelo));
  });

  return [...new Set(codigos.filter(Boolean))];
}

function coincideNumeroVuelo(vuelo, numeroBuscado){
  const codigos = codigosPosiblesVuelo(vuelo);
  if(codigos.includes(numeroBuscado)) return true;

  /* Acepta que la pantalla muestre un código comercial y la API lo agrupe. */
  const parteNumerica = numeroBuscado.replace(/\D/g, "");
  return parteNumerica.length >= 3 && codigos.some((codigo) => codigo.replace(/\D/g, "") === parteNumerica);
}

function seleccionarMejorCoincidencia(vuelos, numeroBuscado){
  return vuelos.find((vuelo) => codigosPosiblesVuelo(vuelo).includes(numeroBuscado))
    || vuelos.find((vuelo) => coincideNumeroVuelo(vuelo, numeroBuscado))
    || vuelos[0];
}

function obtenerFechaISO(valor){
  const coincidencia = String(valor || "").match(/^(\d{4}-\d{2}-\d{2})/);
  return coincidencia ? coincidencia[1] : "";
}

function formatearFechaVuelo(vuelo){
  const fechaISO =
    obtenerFechaISO(vuelo._selectedDate) ||
    obtenerFechaISO(vuelo.fch_hra_prog) ||
    obtenerFechaISO(vuelo.fch_prog);

  if(!fechaISO){
    return t("unavailable");
  }

  const [anio, mes, dia] = fechaISO.split("-").map(Number);
  const fecha = new Date(anio, mes - 1, dia, 12, 0, 0);

  const fechaFormateada = new Intl.DateTimeFormat(
    idiomaActual === "en" ? "en-US" : "es-PE",
    {
      day: "2-digit",
      month: "short",
      year: "numeric"
    }
  ).format(fecha);

  if(vuelo._dayRelation === "today"){
    return `${t("todayLong")} · ${fechaFormateada}`;
  }

  if(vuelo._dayRelation === "tomorrow"){
    return `${t("tomorrowLong")} · ${fechaFormateada}`;
  }

  return fechaFormateada;
}

function mostrarTarjetaVuelo(vuelo){
  const codigo = vuelo.cod_vuelo || vuelo.cod_vuelo_op || t("unavailable");
  const aerolinea = vuelo.abr_aerolinea || vuelo.cod_aerolinea || t("unavailable");
  const estadoOriginal = vuelo.dsc_observacion || vuelo.dsc_estado || "";
  const estado = traducirEstado(estadoOriginal);
  const claseEstado = obtenerClaseEstado(estadoOriginal);

  const ciudad = vuelo.dsc_prc_dest || vuelo.cod_prc_dest || t("unavailable");
  const etiquetaCiudad = vuelo._tipo === "arrival" ? t("origin") : t("destination");
  const fechaVuelo = formatearFechaVuelo(vuelo);

  const horaProgramada = formatearHora(vuelo.hra_prog || vuelo.fch_hra_prog);
  const horaActualizada = formatearHora(vuelo.fch_hra_real || vuelo.fch_hra_ult || vuelo.fch_hra_est);
  const mostrarHoraActualizada = horaActualizada !== t("unavailable") && horaActualizada !== horaProgramada;

  const puerta = primerValor(vuelo.num_puerta_1, vuelo.num_puerta_2);
  const faja = primerValor(vuelo.num_faja_1, vuelo.num_faja_2);
  const terminal = vuelo.num_term_pasajero || vuelo.num_term_aeronave || t("unavailable");
  const operacion = `${vuelo._tipo === "arrival" ? t("arrival") : t("departure")} · ${vuelo._trafico === "international" ? t("international") : t("domestic")}`;

  const datos = [
    { etiqueta:t("date"), valor:fechaVuelo },
    { etiqueta:etiquetaCiudad, valor:ciudad },
    { etiqueta:t("time"), valor:horaProgramada },
    { etiqueta:t("gate"), valor:puerta || t("unavailable") },
    { etiqueta:t("terminal"), valor:terminal },
    { etiqueta:t("operation"), valor:operacion }
  ];

  if(mostrarHoraActualizada){
    datos.splice(2, 0, { etiqueta:t("estimated"), valor:horaActualizada });
  }

  if(faja){
    datos.push({ etiqueta:t("belt"), valor:faja });
  }

  const horaConsulta = new Intl.DateTimeFormat(idiomaActual === "en" ? "en-US" : "es-PE", {
    hour:"2-digit",
    minute:"2-digit"
  }).format(new Date());

  document.getElementById("resultadoVuelo").innerHTML = `
    <article class="tarjeta-vuelo">
      <header class="cabecera-vuelo">
        <div class="identidad-vuelo">
          <div class="aerolinea">${escapeHtml(aerolinea)}</div>
          <div class="codigo-vuelo">✈ ${escapeHtml(codigo)}</div>
          <div class="fecha-destacada">${escapeHtml(fechaVuelo)}</div>
        </div>
        <div class="estado-pill ${claseEstado}">${escapeHtml(estado)}</div>
      </header>

      <div class="datos-vuelo">
        ${datos.map((dato) => `
          <div class="dato-vuelo">
            <div class="dato-etiqueta">${escapeHtml(dato.etiqueta)}</div>
            <div class="dato-valor">${escapeHtml(dato.valor)}</div>
          </div>`).join("")}
      </div>

      <footer class="pie-vuelo">
        ${escapeHtml(t("updated"))}: ${escapeHtml(horaConsulta)}<br>
        ${escapeHtml(t("disclaimer"))}
      </footer>
    </article>`;
}

function primerValor(...valores){
  return valores.find((valor) => valor !== null && valor !== undefined && String(valor).trim() !== "") || "";
}

function formatearHora(valor){
  if(!valor) return t("unavailable");
  const texto = String(valor).trim();
  const coincidencia = texto.match(/(?:\s|^)(\d{2}:\d{2})(?::\d{2})?(?:$|\s)/);
  if(coincidencia) return coincidencia[1];

  const horaSimple = texto.match(/^(\d{2}:\d{2})/);
  return horaSimple ? horaSimple[1] : t("unavailable");
}

function normalizarTexto(valor){
  return String(valor || "")
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .toUpperCase()
    .trim();
}

function traducirEstado(estado){
  const e = normalizarTexto(estado);
  if(!e) return t("unavailable");

  const categorias = [
    { palabras:["CANCEL"], es:"Cancelado", en:"Cancelled" },
    { palabras:["DEMOR", "RETRAS", "DELAY"], es:"Demorado", en:"Delayed" },
    { palabras:["ULTIMO LLAM", "LAST CALL"], es:"Último llamado", en:"Last call" },
    { palabras:["FIN EMBARQ", "EMBARQUE FINALIZADO", "BOARDING CLOSED"], es:"Embarque finalizado", en:"Boarding closed" },
    { palabras:["EMBARC", "BOARDING"], es:"Embarcando", en:"Boarding" },
    { palabras:["ATERRIZ", "LANDED"], es:"Aterrizado", en:"Landed" },
    { palabras:["ARRIB", "LLEGO", "ARRIVED"], es:"Arribó", en:"Arrived" },
    { palabras:["DESPEG", "DEPARTED"], es:"Despegó", en:"Departed" },
    { palabras:["A TIEMPO", "ON TIME"], es:"A tiempo", en:"On time" },
    { palabras:["PROGRAM", "SCHEDULED"], es:"Programado", en:"Scheduled" }
  ];

  const categoria = categorias.find((item) => item.palabras.some((palabra) => e.includes(palabra)));
  if(categoria) return categoria[idiomaActual];

  return String(estado).trim();
}

function obtenerClaseEstado(estado){
  const e = normalizarTexto(estado);
  if(e.includes("CANCEL")) return "estado-rojo";
  if(["DEMOR", "RETRAS", "DELAY"].some((p) => e.includes(p))) return "estado-naranja";
  if(["EMBARC", "BOARDING", "ULTIMO LLAM", "LAST CALL", "FIN EMBARQ"].some((p) => e.includes(p))) return "estado-amarillo";
  if(["A TIEMPO", "ON TIME", "ATERRIZ", "LANDED", "ARRIB", "LLEGO", "ARRIVED", "DESPEG", "DEPARTED"].some((p) => e.includes(p))) return "estado-verde";
  return "estado-neutro";
}

function escapeHtml(valor){
  return String(valor ?? "").replace(/[&<>'"]/g, (caracter) => ({
    "&":"&amp;",
    "<":"&lt;",
    ">":"&gt;",
    "'":"&#39;",
    '"':"&quot;"
  })[caracter]);
}

function activarTeclado(){
  document.querySelectorAll("[role='button']").forEach((elemento) => {
    elemento.addEventListener("keydown", (evento) => {
      if(evento.key === "Enter" || evento.key === " "){
        evento.preventDefault();
        elemento.click();
      }
    });
  });
}

const inputVuelo = document.getElementById("numeroVuelo");
inputVuelo.addEventListener("input", () => {
  const limpio = normalizarNumeroVuelo(inputVuelo.value);
  if(inputVuelo.value !== limpio) inputVuelo.value = limpio;
});

inputVuelo.addEventListener("keydown", (evento) => {
  if(evento.key === "Enter"){
    evento.preventDefault();
    buscarVuelo();
  }
});

activarTeclado();
actualizarTextos();
</script>
