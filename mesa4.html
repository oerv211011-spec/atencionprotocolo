<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Atención VIP - Mesa 4</title>

<link rel="icon" href="assets/logo-lap.png">
<link rel="apple-touch-icon" href="assets/logo-lap.png">
<link rel="manifest" href="manifest.json">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet">

<style>

body{
  font-family: 'Montserrat', sans-serif;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
  flex-direction: column;
  position: relative;
  overflow: hidden;
}

/* Fondo VIP */
body::before{
  content:"";
  position:absolute;
  inset:0;

  background:
    linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)),
    url('assets/salon-vip.jpeg');

  background-size: cover;
  background-position: 40% center;
  background-repeat: no-repeat;

  filter: blur(8px) brightness(0.55);
  transform: scale(1.10);
  z-index:-1;
}

/* BOTÓN VIP (NO TOCADO) */
button{
  position: relative;

  width: 340px;
  height: 340px;

  border-radius: 50%;
  border: 3px solid rgba(255,244,214,0.45);

  background:
radial-gradient(circle at 30% 25%,
#fff9e8 0%,
#f1d58a 18%,
#c79f43 45%,
#8c6624 75%,
#4a3614 100%);

  color: #1a1a1a;
  cursor: pointer;

  box-shadow:
    inset 0 8px 15px rgba(255,255,255,0.35),
    inset 0 -12px 20px rgba(0,0,0,0.25),
    0 15px 40px rgba(0,0,0,0.6),
    0 0 25px rgba(212,175,55,0.25);

  transition: all 0.2s ease;
  animation: pulse 2.5s infinite;

  font-family: 'Montserrat', sans-serif;
  font-weight: 800;
  font-size: 30px;
  letter-spacing: 3px;

  user-select: none;
  -webkit-tap-highlight-color: transparent;
}

/* aro exterior SOLO para el botón principal */
button:not(.idioma-btn)::before{
  content:'';
  position:absolute;
  top:-12px;
  left:-12px;
  width:360px;
  height:360px;
  border-radius:50%;
  border:1px solid rgba(255,244,214,0.40);
}

/* click */
button:active{
  transform: translateY(4px) scale(0.97);
}

/* pulso */
@keyframes pulse{
  0%{
    box-shadow:
      inset 0 8px 15px rgba(255,255,255,0.35),
      inset 0 -12px 20px rgba(0,0,0,0.25),
      0 15px 40px rgba(0,0,0,0.6),
      0 0 0 0 rgba(255,244,214,0.35);
  }
  70%{
    box-shadow:
      inset 0 8px 15px rgba(255,255,255,0.35),
      inset 0 -12px 20px rgba(0,0,0,0.25),
      0 15px 40px rgba(0,0,0,0.6),
      0 0 0 30px rgba(255,244,214,0);
  }
  100%{
    box-shadow:
      inset 0 8px 15px rgba(255,255,255,0.35),
      inset 0 -12px 20px rgba(0,0,0,0.25),
      0 15px 40px rgba(0,0,0,0.6),
      0 0 0 0 rgba(212,175,55,0);
  }
}

/* CAMPANA */
.campana{
  display:block;
  font-size:65px;
  margin-bottom:15px;
}

/* TEXTO */
.texto-boton{
  font-weight: 800;
}

/* MENSAJE VERDE */
#mensaje{
  margin-top: 30px;
  font-size: 18px;
  color: #ffffff;
  text-align: center;
  font-weight: 600;
  min-height: 20px;
}

/* ANIMACIÓN DE PUNTOS */
.dots::after{
  content:'';
  display:inline-block;
  animation: dots 1.2s infinite;
}

@keyframes dots{
  0%   { content:''; }
  25%  { content:'.'; }
  50%  { content:'..'; }
  75%  { content:'...'; }
  100% { content:''; }
}
#pantallaIdioma{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
}

.titulo-bienvenida{
  font-size:34px;
  font-weight:800;
  letter-spacing:4px;
  color:#f1d58a;
  margin-bottom:25px;
  text-shadow:0 0 20px rgba(241,213,138,0.3);
}

.texto-bienvenida{
  font-size:32px;
  font-weight:700;
  margin-bottom:20px;
  color:white;
}

.texto-seleccion{
  font-size:18px;
  margin-bottom:40px;
  line-height:1.7;
  color:rgba(255,255,255,0.9);
}

.idioma-btn{

  width:280px;
  height:80px;

  margin:12px;

  border:none;
  border-radius:18px;

  background:
    radial-gradient(circle at 30% 30%,
    #fff4d6 0%,
    #d6b56d 20%,
    #9d7a35 55%,
    #5b451d 100%);

  color:#1a1a1a;

  font-family:'Montserrat',sans-serif;
  font-size:24px;
  font-weight:800;
  letter-spacing:2px;

  cursor:pointer;

  box-shadow:
    inset 0 8px 15px rgba(255,255,255,0.35),
    inset 0 -12px 20px rgba(0,0,0,0.25),
    0 10px 25px rgba(0,0,0,0.5);

  transition:all .2s ease;
}

.idioma-btn:active{
  transform:scale(0.97);
}
/* LOGO */
.logo-vip{
  position: fixed;
  bottom: 25px;
  right: 15px;
  width: 450px;
  opacity: 0.65;
  pointer-events: none;
}

</style>
</head>

<body>

<!-- 🔔 AUDIO -->
<audio id="sonidoVip" src="assets/campana-vip.mp3" preload="auto"></audio>

<!-- PANTALLA DE IDIOMA -->
<div id="pantallaIdioma">

  <div class="titulo-bienvenida">
    ALTURAS VIP LOUNGE
  </div>

  <div class="texto-bienvenida">
    Bienvenido<br>
    Welcome
  </div>

  <div class="texto-seleccion">
    Seleccione su idioma<br>
    Select your language
  </div>

  <button class="idioma-btn" onclick="seleccionarIdioma('es')">
    ESPAÑOL
  </button>

  <button class="idioma-btn" onclick="seleccionarIdioma('en')">
    ENGLISH
  </button>

</div>

<!-- PANTALLA PRINCIPAL -->
<div id="pantallaPrincipal" style="display:none; flex-direction:column; align-items:center;">

  <button onclick="enviarSolicitud()">
    <span class="campana">🛎️</span>
    <span class="texto-boton">SOLICITAR<br>ASISTENCIA</span>
  </button>

  <div id="mensaje"></div>

</div>

<img src="assets/logo-alturas-transparente.png" class="logo-vip">

<script>

const mesa = 4;
let enviando = false;

function seleccionarIdioma(idioma){

  document.getElementById("pantallaIdioma").style.display = "none";
  document.getElementById("pantallaPrincipal").style.display = "flex";

  const textoBoton = document.querySelector(".texto-boton");

  if(idioma === "en"){
    textoBoton.innerHTML = "REQUEST<br>ASSISTANCE";
  }else{
    textoBoton.innerHTML = "SOLICITAR<br>ASISTENCIA";
  }

}

function enviarSolicitud(){

  if(enviando) return;
  enviando = true;

  const audio = document.getElementById("sonidoVip");
  audio.currentTime = 0;
  audio.play().catch(()=>{});

  const msg = document.getElementById("mensaje");

  msg.classList.add("dots");

  if(document.querySelector(".texto-boton").innerHTML.includes("REQUEST")){
    msg.innerHTML = "Sending request";
  }else{
    msg.innerHTML = "Enviando solicitud";
  }

  fetch("https://script.google.com/macros/s/AKfycbxU5N9gvYgnr6ziPolPuPircfFdsRzLgCfVqntC8WGwZ-wath6i5o1dUuAfPFcBVJh2/exec?mesa=" + mesa)

  .then(() => {

    msg.classList.remove("dots");

    if(document.querySelector(".texto-boton").innerHTML.includes("REQUEST")){
      msg.innerHTML = "✔ Staff notified";
    }else{
      msg.innerHTML = "✔ Personal notificado";
    }

    setTimeout(() => {
      msg.innerHTML = "";
      enviando = false;
    }, 3000);

  })

  .catch(() => {

    msg.classList.remove("dots");

    if(document.querySelector(".texto-boton").innerHTML.includes("REQUEST")){
      msg.innerHTML = "❌ Connection error";
    }else{
      msg.innerHTML = "❌ Error de conexión";
    }

    setTimeout(() => {
      msg.innerHTML = "";
      enviando = false;
    }, 3000);

  });

}

</script>

</body>
</html>
