<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Atención VIP - Mesa 3</title>

<link rel="icon" href="assets/logo-lap.png">
<link rel="apple-touch-icon" href="assets/logo-lap.png">
<link rel="manifest" href="manifest.json">

<!-- FUENTE VIP -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

body{
  font-family: 'Poppins', sans-serif;
  background:
    radial-gradient(circle at top, rgba(80,80,80,0.25), transparent 60%),
    radial-gradient(circle at bottom, #000000, #0a0a0a),
    linear-gradient(135deg, #121212, #000000);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
  flex-direction: column;
}

/* BOTÓN VIP CON PULSO */
button{
  width: 340px;
  height: 340px;
  border-radius: 50%;
  border: 2px solid #d4af37;
  background: radial-gradient(circle at top, #ffe9a6, #b8860b);
  color: #111;
  font-weight: 700;
  font-size: 24px;
  letter-spacing: 0.5px;
  cursor: pointer;
  box-shadow:
    0 25px 60px rgba(0,0,0,0.85),
    inset 0 2px 10px rgba(255,255,255,0.25);
  transition: all 0.2s ease;
  animation: pulse 2.5s infinite;
}

/* click */
button:active{
  transform: scale(0.94);
}

/* pulso */
@keyframes pulse{
  0% {
    box-shadow: 0 0 0 0 rgba(212,175,55,0.4),
                0 25px 60px rgba(0,0,0,0.85);
  }
  70% {
    box-shadow: 0 0 0 25px rgba(212,175,55,0),
                0 25px 60px rgba(0,0,0,0.85);
  }
  100% {
    box-shadow: 0 0 0 0 rgba(212,175,55,0),
                0 25px 60px rgba(0,0,0,0.85);
  }
}

/* mensaje */
#mensaje{
  margin-top: 25px;
  font-size: 18px;
  color: #00ff88;
  text-align: center;
  font-weight: 500;
  min-height: 20px;
}

</style>

</head>

<body>

<button onclick="enviarSolicitud()">
🔔<br><br>
SOLICITAR<br>
ATENCIÓN
</button>

<div id="mensaje"></div>

<script>

const mesa = 3;

function enviarSolicitud(){

fetch("https://script.google.com/macros/s/AKfycbxU5N9gvYgnr6ziPolPuPircfFdsRzLgCfVqntC8WGwZ-wath6i5o1dUuAfPFcBVJh2/exec?mesa="+mesa)
.then(r => r.text())
.then(() => {

  document.getElementById("mensaje").innerHTML =
  "✔ Solicitud enviada";

  setTimeout(() => {
    document.getElementById("mensaje").innerHTML = "";
  }, 3500);

});

}

</script>

</body>
</html>
